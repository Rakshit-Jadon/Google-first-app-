<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goku Interactive 3D Avatar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <!-- Removed Three JS module map -->
</head>
<body>
    <canvas id="goku-canvas"></canvas>

    <div class="interactive-ui">
        <textarea id="user-input" style="display: none;"></textarea>
        <button id="send-btn" style="display: none;"></button>
        <button id="clear-chat" style="display: none;"></button>

        <div id="subtitle-display" class="subtitle-display">Ready to train!</div>

        </button>
    </div>
    
    <script src="/static/app.js?v=8"></script>
    <script src="/static/goku_animation.js?v=1"></script>
</body>
</html>
